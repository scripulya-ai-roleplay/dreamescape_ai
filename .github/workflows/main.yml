name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Define pre-built images as native pipeline services
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dbname
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Standard healthcheck for native services
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # WORKAROUND: Initialize DB
      # Since we cannot mount init.sql in the services block, apply it now.
      - name: Initialize PostgreSQL Database
        env:
          PGPASSWORD: password
        run: |
          psql -h 127.0.0.1 -U user -d dbname -f ./scripts/init.sql

      # WORKAROUND: Mock API Build & Alias
      - name: Map Google API alias to localhost
        run: echo "127.0.0.1 generativelanguage.googleapis.com" | sudo tee -a /etc/hosts

      # STAGE 0: Linting & Formatting
      - name: Stage 0a - Ruff Linter
        uses: astral-sh/ruff-action@v1
        with:
          # Pin version here if needed, e.g., version: "0.3.5"
          args: "check ."

      - name: Stage 0b - Ruff Formatter
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check ."

      - name: Build and start Mock Google API
        # Builds the local Dockerfile and runs it in the background.
        # Ensure the port mapped (443 here) matches what your app expects.
        run: |
          docker build -t mock-api -f google_api_mock/Dockerfile .
          docker run -d --name mock-google-api -p 443:443 mock-api

      # STAGE 1: Build
      - name: Stage 1 - Build App Image
        run: docker build -t main-app .

      # STAGE 2: Unit Tests
      - name: Stage 2 - Run Unit Tests
        # Runs in isolation. No database or network connections provided.
        run: |
          docker run --rm main-app pytest tests/unit

      # STAGE 2.5: Start Service for E2E
      - name: Stage 2.5 - Start Main Application
        run: |
          docker run -d --name running-app --network host \
            -e GEMINI_API_KEY=fake_api_key_for_testing \
            -e DATABASE_URL=postgresql+asyncpg://user:password@127.0.0.1:5432/dbname \
            main-app

      - name: Wait for application to be ready
        run: |
          timeout 30 bash -c 'while ! curl -s http://127.0.0.1:8000 > /dev/null; do sleep 2; done'

      # STAGE 3: End-to-End Tests
      - name: Stage 3 - Run E2E Tests
        run: |
          docker run --rm --network host \
            -e BACKEND_HOST=http://127.0.0.1:8000 \
            -e GEMINI_API_KEY=fake_api_key_for_testing \
            main-app pytest tests/e2e

      - name: Dump Application Logs
        if: always() # Ensures this runs even if Stage 3 fails
        # Redirects both stdout and stderr to a file.
        # The || true prevents the pipeline from failing if the container crashed early.
        run: docker logs running-app > running-app.log 2>&1 || true

      - name: Upload Application Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-running-app-logs
          path: running-app.log
          retention-days: 5 # Keeps your GitHub storage clean

      # Cleanup
      - name: Stop Background Services
        if: always()
        run: |
          docker stop running-app mock-google-api || true
          docker rm running-app mock-google-api || true
