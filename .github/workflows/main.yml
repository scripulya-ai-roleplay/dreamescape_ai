name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1) Unit tests + linting. Runs on the runner (no Docker, no services) so it
  #    is fast and gates the more expensive build/e2e stages. Unit tests are
  #    isolated and need no database or network.
  # ─────────────────────────────────────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # STAGE 0: Linting & Formatting
      - name: Ruff Linter
        uses: astral-sh/ruff-action@v1
        with:
          args: "check ."

      - name: Ruff Formatter
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check ."

      # STAGE 1: Unit tests (deps generated from pyproject.toml + uv.lock to mirror the image)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: uv.lock

      - name: Install dependencies
        # Materialise requirements.txt from pyproject.toml + uv.lock (single source of
        # truth) so there is no hand-maintained lockfile to drift against.
        run: |
          pip install uv==0.10.4
          uv export --frozen --no-dev --no-emit-project -o requirements.txt
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python -m pytest tests/unit

  # ─────────────────────────────────────────────────────────────────────────
  # 2) Dockerfile build. Verifies the image builds and exports it so the e2e
  #    job tests the exact artifact that was built here (no rebuild).
  # ─────────────────────────────────────────────────────────────────────────
  build:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build App Image
        run: docker build -t main-app -f build/Dockerfile .

      # Share the built image with the e2e job (separate runner). Alternatives:
      # push to ghcr.io and pull in e2e — heavier setup, but cleaner for reuse.
      - name: Export image
        run: docker save main-app -o main-app.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-app-image
          path: main-app.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 3) End-to-end tests. Loads the image from `build`, stands up the services
  #    the app needs, and runs the e2e suite against the running app.
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    needs: build
    runs-on: ubuntu-latest
    # Define pre-built images as native pipeline services
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dbname
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Standard healthcheck for native services
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # RabbitMQ broker required by the app at startup (scripulya_agent integration).
      # E2E uses the local testing_mock model, so scripulya_agent itself is not needed here.
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load App Image
        uses: actions/download-artifact@v4
        with:
          name: main-app-image
          path: .

      - name: Import image
        run: docker load -i main-app.tar

      # WORKAROUND: Initialize DB
      # Since we cannot mount init.sql in the services block, apply it now.
      - name: Initialize PostgreSQL Database
        env:
          PGPASSWORD: password
        run: |
          psql -h 127.0.0.1 -U user -d dbname -f ./scripts/init.sql

      # WORKAROUND: Mock API Build & Alias
      - name: Map Google API alias to localhost
        run: echo "127.0.0.1 generativelanguage.googleapis.com" | sudo tee -a /etc/hosts

      - name: Build and start Mock Google API
        # Builds the local Dockerfile and runs it in the background.
        # Ensure the port mapped (443 here) matches what your app expects.
        run: |
          docker build -t mock-api -f google_api_mock/Dockerfile .
          docker run -d --name mock-google-api -p 443:443 mock-api

      # STAGE: Start Service for E2E
      - name: Start Main Application
        run: |
          docker run -d --name running-app --network host \
            -e GEMINI_API_KEY=fake_api_key_for_testing \
            -e DATABASE_URL=postgresql+asyncpg://user:password@127.0.0.1:5432/dbname \
            -e RABBIT_URL=amqp://guest:guest@127.0.0.1:5672/ \
            main-app

      - name: Wait for application to be ready
        run: |
          timeout 30 bash -c 'while ! curl -s http://127.0.0.1:8000 > /dev/null; do sleep 2; done'

      - name: Run E2E Tests
        run: |
          docker run --rm --network host \
            -e BACKEND_HOST=http://127.0.0.1:8000 \
            -e GEMINI_API_KEY=fake_api_key_for_testing \
            main-app pytest tests/e2e

      - name: Dump Application Logs
        if: always() # Ensures this runs even if E2E fails
        # Redirects both stdout and stderr to a file.
        # The || true prevents the pipeline from failing if the container crashed early.
        run: docker logs running-app > running-app.log 2>&1 || true

      - name: Upload Application Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-running-app-logs
          path: running-app.log
          retention-days: 5 # Keeps your GitHub storage clean

      # Cleanup
      - name: Stop Background Services
        if: always()
        run: |
          docker stop running-app mock-google-api || true
          docker rm running-app mock-google-api || true
