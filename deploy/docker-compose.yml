services:
  # Your main application
  app:
    build:
      # Compose lives in deploy/, so the build context is the repo root (..)
      # and the Dockerfile is the one we moved into build/.
      context: ..
      dockerfile: build/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=fake_api_key_for_testing
      - LLM_AGENT_ENABLED=false
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - LLM_AGENT_REQUEST_QUEUE=llm.agent.request
      - LLM_AGENT_RESULT_QUEUE=llm.agent.result
      - LLM_AGENT_TIMEOUT=60
    networks:
      - app-network
    depends_on:
      mock-google-api:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # PostgreSQL database service
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=dbname
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Mock Google API service
  mock-google-api:
    build:
      context: ..
      dockerfile: google_api_mock/Dockerfile
    networks:
      app-network:
        aliases:
          - generativelanguage.googleapis.com

  # RabbitMQ broker for the scripulya_agent integration.
  # NOTE: scripulya_agent itself must connect to this same broker (shared across services).
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI (guest/guest)
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: